<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: {{bg_color}};
            color: {{body_color}};
            line-height: 1.5;
        }

        a {
            color: {{body_color}};
            text-decoration: none;
        }

        a img {
            border: 0;
            outline: none;
        }

        .email-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background-color: {{bg_color}};
            padding: 0;
        }

        .header-logo {
            padding: 30px 30px 5px;
            text-align: left;
        }

        .header-logo img {
            width: 56px;
            height: 56px;
        }

        .content {
            padding: 5px 30px 40px;
            min-width: 320px;
        }

        .main-heading {
            font-family: 'Helvetica', 'Helvetica Neue', sans-serif;
            font-size: 48px;
            font-weight: 700;
            text-align: left;
            color: {{heading_color}};
            line-height: 0.8;
            margin: 15px 0 20px;
            letter-spacing: -1px;
        }

        .main-heading .line {
            display: block;
            padding: 5px;
        }

        .body-text {
            font-family: 'Helvetica', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            color: {{body_color}};
            text-align: left;
            margin: 10px 0;
            line-height: 1.6;
        }

        .body-text a {
            color: {{body_color}};
            text-decoration: underline;
        }

        .body-text p {
            margin: 0 0 16px;
        }

        .body-text img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 16px 0;
        }

        .cta-button {
            display: block;
            background-color: {{btn_color}};
            color: {{btn_text_color}};
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 16px;
            margin: 40px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            box-sizing: border-box;
        }

        .cta-button:hover {
            opacity: 0.9;
        }

        .jelly-title {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: {{body_color}};
            text-align: left;
            margin-top: 12px;
            font-weight: 400;
            text-decoration: none;
            display: block;
        }

        @media only screen and (max-width: 600px) {
            body {
                padding: 0;
                margin: 0;
            }

            .email-container {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0;
                margin: 0 auto;
            }

            .content {
                padding: 10px 20px 30px;
                min-width: 320px;
            }

            .main-heading {
                font-size: 32px;
                margin: 20px 0 15px;
                line-height: 1.1;
            }

            .body-text {
                font-size: 14px;
                margin: 8px 0;
            }

            .cta-button {
                width: 100%;
                margin: 30px 0;
                padding: 14px 24px;
                font-size: 14px;
            }
        }

        @media only screen and (max-width: 480px) {
            .main-heading {
                font-size: 28px;
            }

            .body-text {
                font-size: 13px;
            }

            .cta-button {
                font-size: 13px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
<span style="display:none !important; visibility:hidden; mso-hide:all; font-size:1px; line-height:1px; max-height:0; max-width:0; opacity:0; overflow:hidden;">{{preheader}}</span>
<div class="email-container">
    <div class="header-logo">
        <a href="https://www.jellyjelly.com" target="_blank">
            <img src="{{logo_src}}" alt="Jelly Logo">
        </a>
    </div>

    <div class="content">
        <h1 class="main-heading">
            <span class="line">BIG</span>
            <span class="line">NEWS!</span>
        </h1>

        <div class="body-text">
            {{body}}
        </div>

        <a href="{{cta_url}}" class="cta-button">CHECK IT OUT</a>
    </div>
</div>

<div class="email-container" align="center" style="padding: 30px;">
    <p style="color: #dfdfdf; font-size: 12px; margin: 0 0 10px 0;">
        &copy; 2026 JellyJelly
    </p>
    <p style="color: #aaaaaa; font-size: 12px; margin: 0;">
        <a href="{{unsubscribe_url}}" style="color: #aaaaaa; text-decoration: underline;">Unsubscribe</a>
    </p>
</div>

</body>
</html>
